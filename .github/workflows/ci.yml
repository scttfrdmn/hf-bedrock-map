name: ci

# Build, vet, and test on every push and PR. No AWS or HF access needed — the
# tests cover the pure resolver/parse logic, not live API calls.
on:
  push:
    branches: [main]
    # Skip the data-only commits the refresh job pushes.
    paths-ignore:
      - "docs/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: gofmt -l cmd/ | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go test ./...
